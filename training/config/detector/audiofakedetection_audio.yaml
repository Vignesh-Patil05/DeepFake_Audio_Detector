# --- TOP LEVEL KEYS (Fixes the KeyErrors) ---
log_dir: 'training/logs/fakeavceleb_pro_gen'
device: 'cuda'
ngpu: 1
pretrained: 'False'
manualSeed: 1024

# Fixes KeyError: 'lr_scheduler'
lr_scheduler:
  type: cos
  cos:
    T_max: 20
    eta_min: 0.000001

# Fixes KeyError: 'mi_param'
mi_param:
  mi_turn_on: True
  mi_loss_weight: 0.1

# Fixes KeyError: 'sam_param'
sam_param:
  rho: 0.05
  use_adaptive_sam: False

# --- MODEL SETTINGS ---
model_name: AudioFakeDetector
backbone_name: rawnet2
encoder_feat_dim: 1024

# --- BACKBONE SETTINGS ---
backbone_config:
  num_classes: 2
  device: 'cuda'
  nb_classes: 2      
  in_channels: 1
  filts: [128, [128, 128], [128, 512], [512, 512]]
  first_conv: 1024   
  gru_node: 1024
  nb_gru_layer: 3
  nb_fc_node: 1024
  nb_samp: 64000
  mode: adjust_channel
  dropout: 0.05

# --- DATASET SETTINGS ---
dataset_type: pair-audio
train_dataset: ['train.list']
test_dataset: ['test.list']
train_file: 'C:/Users/vishu/AI-Synthesized-Voice-Generalization-main/train.list'
test_file: 'C:/Users/vishu/AI-Synthesized-Voice-Generalization-main/test.list'
dataset_root: 'C:/Users/vishu/AI-Synthesized-Voice-Generalization-main/datasets/FakeAVCeleb_audio'

# --- HARDWARE OPTIMIZATION (Locking Batch Size at 4) ---
train_batchSize: 4  
test_batchSize: 4
workers: 0          
save_ckpt: true
save_feat: true

# --- OPTIMIZER & LOSS ---
label_dict:
  real: 0
  fake: 1

optimizer:
  type: adam
  adam:
    lr: 0.0001
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0005
    amsgrad: false

nEpochs: 20
start_epoch: 0
save_epoch: 1
rec_iter: 100
cuda: true
cudnn: true

loss_func:
  cls_loss: cross_entropy
  spe_loss: cross_entropy
  con_loss: contrastive_regularization
  rec_loss: l1loss
metric_scoring: auc